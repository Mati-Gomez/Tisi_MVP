<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css"> <title>Iniciar Sesión</title>
</head>
<body>
    <main class="auth-container">
        <div class="auth-box">
            <h2>Bienvenido</h2>
            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" class="urgency-input" placeholder="usuario@email.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" class="urgency-input" placeholder="••••••">
                </div>
                <button type="submit" class="btn-primary btn-full">Ingresar</button>
            </form>
        </div>
    </main>
</body>
</html>
